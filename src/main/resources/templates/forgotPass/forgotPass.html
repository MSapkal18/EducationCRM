<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">


    <title>Reset Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
        }
        .reset-box {
            background: white;
            width: 350px;
            padding: 20px;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
        }
        .reset-box img {
            width: 50%;
            margin-bottom: 15px;
        }
        .input-field {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #dbdbdb;
            border-radius: 5px;
            font-size: 14px;
        }
        .reset-btn {
            background-color: #0095f6;
            color: white;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .reset-btn:hover {
            background-color: #007acc;
        }
        .back-login {
            margin-top: 15px;
            font-size: 14px;
        }
        .back-login a {
            color: #0095f6;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="reset-box">
            <img src="" alt="Logo">
            <h3>Reset Password</h3>
            <p>Enter your email</p>
            <form action="forOTP" method="post">

                <input name="email" required="requireds" type="email" class="input-field" placeholder="Email">
                <button class="reset-btn">Send OTP</button>
            </form>
            <div class="back-login">
                <a href="login" >Back to Login</a>
            </div>
        </div>
    </div>

</body>
</html>
